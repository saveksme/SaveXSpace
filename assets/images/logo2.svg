<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#CC99FF"/>
  <g transform="translate(50,50) rotate(-45)">
    <!-- Main globe ellipses -->
    <ellipse cx="0" cy="0" rx="28" ry="28" fill="none" stroke="#1A1A1A" stroke-width="5"/>
    <ellipse cx="0" cy="0" rx="28" ry="12" fill="none" stroke="#1A1A1A" stroke-width="5"/>
    <ellipse cx="0" cy="0" rx="12" ry="28" fill="none" stroke="#1A1A1A" stroke-width="5"/>
    <!-- Center vertical line -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#1A1A1A" stroke-width="4"/>
    <!-- Center horizontal line -->
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#1A1A1A" stroke-width="4"/>
    <!-- Leaf petals at cardinal points -->
    <path d="M0,-32 C8,-24 8,-16 0,-12 C-8,-16 -8,-24 0,-32Z" fill="#1A1A1A"/>
    <path d="M0,32 C-8,24 -8,16 0,12 C8,16 8,24 0,32Z" fill="#1A1A1A"/>
    <path d="M-32,0 C-24,-8 -16,-8 -12,0 C-16,8 -24,8 -32,0Z" fill="#1A1A1A"/>
    <path d="M32,0 C24,8 16,8 12,0 C16,-8 24,-8 32,0Z" fill="#1A1A1A"/>
  </g>
</svg>
